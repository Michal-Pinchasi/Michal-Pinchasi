name: GitHub-Profile-Summary-Cards

on:
  schedule: # מריץ את העדכון כל 24 שעות
    - cron: "0 0 * * *"
  workflow_dispatch: # מאפשר לך להריץ את זה ידנית מתי שבא לך

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - uses: vn7n24fzkq/github-profile-summary-cards@v2.3.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          username: Michal-Pinchasi
          theme: city_lights
